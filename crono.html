<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crono</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="crono.css" />
</head>
<body class="crono-page">
  <main class="crono-shell">
    <h1 class="crono-title" id="cronoPageTitle">Cronograma</h1>
    <p class="crono-text" id="cronoPageText">Elige una parte del día para ver su página correspondiente.</p>

    <div class="crono-actions">
      <a class="crono-btn" id="cronoPreparacion" href="preparacion.html">
        <strong id="cronoPreparacionLabel">PREPARACIÓN</strong>
      </a>

      <a class="crono-btn" id="cronoCeremonia" href="ceremonia.html">
        <strong id="cronoCeremoniaLabel">CEREMONIA</strong>
        <span class="crono-btn-subtitle" id="cronoCeremoniaSubtitle">CATEDRAL DE SEGOVIA</span>
      </a>

      <a class="crono-btn" id="cronoCelebracion" href="celebracion.html">
        <strong id="cronoCelebracionLabel">CELEBRACIÓN</strong>
        <span class="crono-btn-subtitle" id="cronoCelebracionSubtitle">ZIBA EVENTOS</span>
      </a>

      <a class="crono-btn" id="cronoInvitacion" href="invitation.html">
        <strong id="cronoInvitacionLabel">INVITACIÓN</strong>
      </a>
    </div>
  </main>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const lang = params.get('lang') || 'es';
      const name = params.get('name') || '';
      const code = params.get('code') || '';
      const T = {
        es: {
          title: 'Cronograma',
          text: 'Elige una parte del día para ver su página correspondiente.',
          preparacion: 'PREPARACIÓN',
          ceremonia: 'CEREMONIA',
          celebracion: 'CELEBRACIÓN',
          invitacion: 'INVITACIÓN',
          ceremoniaSubtitle: 'CATEDRAL DE SEGOVIA',
          celebracionSubtitle: 'ZIBA EVENTOS',
        },
        it: {
          title: 'Cronoprogramma',
          text: 'Scegli una parte della giornata per vedere la pagina corrispondente.',
          preparacion: 'PREPARAZIONE',
          ceremonia: 'CERIMONIA',
          celebracion: 'CELEBRAZIONE',
          invitacion: 'INVITO',
          ceremoniaSubtitle: 'CATTEDRALE DI SEGOVIA',
          celebracionSubtitle: 'ZIBA EVENTOS',
        },
      };
      const copy = T[lang] || T.es;

      const links = {
        preparacion: document.getElementById('cronoPreparacion'),
        ceremonia: document.getElementById('cronoCeremonia'),
        celebracion: document.getElementById('cronoCelebracion'),
        invitacion: document.getElementById('cronoInvitacion'),
      };

      document.getElementById('cronoPageTitle').textContent = copy.title;
      document.getElementById('cronoPageText').textContent = copy.text;
      document.getElementById('cronoPreparacionLabel').textContent = copy.preparacion;
      document.getElementById('cronoCeremoniaLabel').textContent = copy.ceremonia;
      document.getElementById('cronoCelebracionLabel').textContent = copy.celebracion;
      document.getElementById('cronoInvitacionLabel').textContent = copy.invitacion;
      document.getElementById('cronoCeremoniaSubtitle').textContent = copy.ceremoniaSubtitle;
      document.getElementById('cronoCelebracionSubtitle').textContent = copy.celebracionSubtitle;

      const buildUrl = (page) => {
        const url = new URL(page, window.location.href);
        url.searchParams.set('lang', lang);
        if (name) url.searchParams.set('name', name);
        if (code) url.searchParams.set('code', code);
        return url.toString();
      };

      Object.entries(links).forEach(([key, link]) => {
        if (!link) return;
        const pageMap = {
          preparacion: 'preparacion.html',
          ceremonia: 'ceremonia.html',
          celebracion: 'celebracion.html',
          invitacion: 'invitation.html',
        };
        link.href = buildUrl(pageMap[key]);
      });

      const hide = (link) => {
        if (link) link.style.display = 'none';
      };

      if (code === '0015' || code === '0016') {
        hide(links.ceremonia);
        hide(links.celebracion);
      }

      if (code === '0001' || code === '0002') {
        hide(links.preparacion);
        hide(links.ceremonia);
      }

      if (code === '0005') {
        hide(links.preparacion);
        hide(links.ceremonia);
      }

      if (code === '0017') {
        hide(links.preparacion);
        hide(links.celebracion);
        hide(links.invitacion);
      }
    })();
  </script>
</body>
</html>
